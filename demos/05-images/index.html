<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Images Demo</title>
        <link href="css/style.css" rel="stylesheet"> 
    </head>
    <body>
        <img 
            src="images/hedgehog1.jpg" 
            width="100" 
            alt="a hedgehog being held in someone's hand"
        >
        <br>
        <b>This is bold text</b>
        <br>
        <img
            src="images/hedgehog2.webp"
            width="100"
            alt="a hedgehog staring at the camera over a log"
        >
        <p>
            <b>This is bold text</b>
        </p>
        <!-- This is a bad example, using both height and width -->
        <img 
            src="images/hedgehog3.jpg"
            alt="a hedgehog"
            height="100"
            width="200"
        >
    </body>
</html>
